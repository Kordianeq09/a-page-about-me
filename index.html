<!doctype=html>
<head>
  <title> strona o mnie </title>
  <style>
  #floatingBox {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #FFA1BA;
    color: black;
    padding: 25px 50px;
    border-radius: 5px;
    font-family: Arial;
    box-shadow:
      0 25px 50px rgba(0,0,0,0.3),
      0 30px 60px rgba(0,0,0,0.4);
    z-index:10;
  }
    #LeftPanel {
      position:fixed;
      top:50%;
      left:-240px;
      width:200px;
      height:250px;
      background: #FFA1BA;
      padding:50px;
      position:relative;
      box-shadow:
       0 25px 50px rgba(0,0,0,0.3),
       0 30px 60px rgba(0,0,0,0.4);
      transition: right 0.4s ease;
      z-index:100;
      .LeftPanel {
  user-select: none;
}
  </style>
</head>
<body>
<div id="floatingBox"><h2>Hej! trafiłxś na strone o mnie nazywam się Kordian i interesuje się programowaniem stron internetowych, właśnie takich jak ta</h3></div>
<div id="LeftPanel"><h2>Moje Zainteresowania:</h2></div>

<script>
  const panel = document.getElementById("LeftPanel");
  let dragging = false
  panel.addEventListener("mousedown", () => {
    dragging = true;
  });
  panel.addEventListener("mousemove", (e) => {
    if(!dragging) return;
    let x = e.clientX - 250;

    if(x > 0) x = 0;
    if(x < -220) x = -220;

    panel.style.left = x + "px";
});

document.addEventListener("mouseup", () => {
    dragging = false;
});
</script>
  
</body>
</html>
